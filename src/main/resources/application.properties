spring.application.name=hte
server.shutdown=graceful

hte.config.path=${HTE_CONFIG_PATH:assets/config.infinite.json}
hte.db.path=${HTE_DB_PATH:assets/data.json}

# Order preprocessing bounds (clamps incoming order price/volume)
hte.order.max.price=${ORDER_MAX_PRICE:1000}
hte.order.min.price=${ORDER_MIN_PRICE:0}
hte.order.max.volume=${ORDER_MAX_VOLUME:1000}
hte.order.min.volume=${ORDER_MIN_VOLUME:0}

hte.http.url=${HTTP_URL:http://localhost:8080}
hte.ws.url=${WS_URL:ws://localhost:8080/exchange-socket}

hte.admin.username=${ADMIN_USERNAME}
hte.admin.password=${ADMIN_PASSWORD}
