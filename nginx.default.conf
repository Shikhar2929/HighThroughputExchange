server {
    server_name infra.tradinggt.org;

    # ------------------------------
    # WebSocket Endpoint
    # ------------------------------
    location /exchange-socket {
        proxy_pass http://localhost:8080/exchange-socket;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ------------------------------
    # Frontend + API
    # ------------------------------
    location / {

    proxy_hide_header Access-Control-Allow-Origin;

    add_header Access-Control-Allow-Origin "https://comp.tradinggt.org" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_pass http://localhost:8080;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    }

    listen 443 ssl http2;

    ssl_certificate /etc/letsencrypt/live/infra.tradinggt.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infra.tradinggt.org/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name infra.tradinggt.org;
    return 301 https://$host$request_uri;
}
